ener(\'click\',function(ev){\n        ev.preventDefault(); ev.stopPropagation();\n        document.querySelectorAll(\'.v71-color-selectable\').forEach(function(x){x.classList.remove(\'v71-picked\')});\n        el.classList.add(\'v71-picked\');\n        showShirt(guessColorElementName(el));\n      },true);\n    });\n    if(!document.getElementById(\'v71-color-instruction\')){\n      const p=document.createElement(\'p\'); p.id=\'v71-color-instruction\'; p.style.cssText=\'margin:10px 0 0;color:#667085;font-size:13px;line-height:1.45\';\n      p.textContent=\'اضغط على أي لون لمشاهدة T-shirt/Polo بنفس اللون، ثم اضغط + لإضافته إلى devis.\';\n      section.appendChild(p);\n    }\n  }\n  function findDevisBox(){\n    const hs=[...document.querySelectorAll(\'h1,h2,h3\')].filter(function(h){return /demande de devis rapide/i.test(h.textContent||\'\')});\n    if(hs[0]) return hs[0].closest(\'section,article,form,div\') || hs[0].parentElement;\n    const selects=[...document.querySelectorAll(\'select\')];\n    const s=selects.find(function(x){return [...x.options].some(function(o){return /salopette|tenue agent|produit local|pack avantageux/i.test(o.textContent||\'\')})});\n    return s ? (s.closest(\'section,article,form,div\') || s.parentElement) : null;\n  }\n  function readDevis(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const qtyInput=inputs.find(function(i){return (i.type===\'number\') || /^\\d+$/.test(i.value||\'\') || /quant/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const colorInput=inputs.find(function(i){return /couleur|noir|bleu/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const nameInput=inputs.find(function(i){return /entreprise|nom|soci/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const details=box.querySelector(\'textarea\')?.value||\'\';\n    const cat=selects[0]?.value||\'\';\n    const prod=selects[1]?.value||\'\';\n    const pack=selects[2]?.value||\'\';\n    const qty=parseInt(qtyInput?.value||\'1\',10)||1;\n    let meta=[];\n    if(cat) meta.push(\'Catégorie: \'+cat);\n    if(pack && !/choisissez/i.test(pack)) meta.push(\'Pack: \'+pack);\n    if(colorInput?.value) meta.push(\'Couleur: \'+colorInput.value);\n    return {name:prod||pack||cat||\'Produit PROTEX-DZ\',meta:meta.join(\' — \'),qty:qty,company:nameInput?.value||\'\',details:details};\n  }\n  function installBigPlus(){\n    const box=findDevisBox(); if(!box) return;\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const qty=inputs.find(function(i){return (i.type===\'number\') || /^\\d+$/.test(i.value||\'\') || /quant/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    if(qty && !document.getElementById(\'v71-plus-next-qty\')){\n      const wrap=document.createElement(\'div\'); wrap.className=\'v71-devis-plus-wrap\';\n      qty.parentElement.insertBefore(wrap,qty);\n      wrap.appendChild(qty);\n      const plus=document.createElement(\'button\'); plus.id=\'v71-plus-next-qty\'; plus.type=\'button\'; plus.className=\'v71-big-plus\'; plus.textContent=\'+\';\n      plus.onclick=function(){const item=readDevis(box); addItem(item.name,item.meta,item.qty,\'\');};\n      wrap.appendChild(plus);\n    }\n    if(!document.getElementById(\'v71-quick-cart\')){\n      const panel=document.createElement(\'div\'); panel.id=\'v71-quick-cart\'; panel.className=\'v71-quick-cart\';\n      panel.innerHTML=\'<h3>Panier du devis</h3><p>اختار منتج وكمية ثم اضغط +. تقدر تضيف عدة منتجات، وفي الأخير ترسلهم كامل في WhatsApp.</p><div class="v71-quick-actions"><button class="v71-add-current" type="button" id="v71-add-current">+ Ajouter ce produit au panier</button><div id="v71-quick-list" class="v71-quick-list"></div><button class="v71-send-all" type="button" id="v71-send-all">Envoyer tout le devis sur WhatsApp</button></div>\';\n      const oldSend=[...box.querySelectorAll(\'a,button\')].reverse().find(function(b){return /whatsapp|envoyer/i.test((b.textContent||\'\').toLowerCase())});\n      if(oldSend && oldSend.parentElement) oldSend.parentElement.insertBefore(panel,oldSend); else box.appendChild(panel);\n      document.getElementById(\'v71-add-current\').onclick=function(){const item=readDevis(box); addItem(item.name,item.meta,item.qty,\'\');};\n      document.getElementById(\'v71-send-all\').onclick=function(){sendAll(box)};\n      renderMiniCart();\n    }\n  }\n  function renderMiniCart(){\n    const list=document.getElementById(\'v71-quick-list\'); if(!list) return;\n    load();\n    if(!cart.length){list.innerHTML=\'<div class="v69-empty">لا يوجد منتجات بعد. اضغط + لإضافة المنتج الحالي.</div>\';return;}\n    list.innerHTML=cart.map(function(it,i){return \'<div class="v71-quick-item"><div><strong>\'+esc(it.name)+\'</strong><small>\'+esc(it.meta||\'Produit sélectionné\')+\'</small></div><div>Qté \'+(it.qty||1)+\'</div><button class="v71-remove" type="button" onclick="window.v71Remove(\'+i+\')">×</button></div>\'}).join(\'\');\n  }\n  window.v71Remove=function(i){load(); cart.splice(i,1); save();}\n  function sendAll(box){\n    load();\n    const form=readDevis(box);\n    const items=cart.length?cart:[{name:form.name,meta:form.meta,qty:form.qty}];\n    const lines=items.map(function(x,i){return (i+1)+\'. \'+x.name+\' — Qté: \'+(x.qty||1)+(x.meta?\' — \'+x.meta:\'\')}).join(\'\\n\');\n    const msg=\'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\\n\\nNom / société: \'+(form.company||\'Non précisé\')+\'\\n\\nProduits demandés:\\n\'+lines+\'\\n\\nDétails supplémentaires:\\n\'+(form.details||\'Non précisé\')+\'\\n\\nPage: \'+location.href;\n    window.open(\'https://wa.me/\'+WHATSAPP+\'?text=\'+encodeURIComponent(msg),\'_blank\',\'noopener\');\n  }\n  function boot(){makeColorsClickable(); installBigPlus(); renderMiniCart();}\n  if(document.readyState===\'loading\') document.addEventListener(\'DOMContentLoaded\',boot); else boot();\n  setInterval(boot,1200);\n})();\n'; document.body.appendChild(sc3); const sc4=document.createElement('script'); sc4.textContent='\n(function(){\n  const STORE=\'protexdz_v72_product_quantities\';\n  let quantities={};\n  function load(){try{quantities=JSON.parse(localStorage.getItem(STORE)||\'{}\')}catch(e){quantities={}}}\n  function save(){localStorage.setItem(STORE,JSON.stringify(quantities));}\n  function esc(s){return String(s||\'\').replace(/[&<>"]/g,function(m){return {\'&\':\'&amp;\',\'<\':\'&lt;\',\'>\':\'&gt;\',\'"\':\'&quot;\'}[m]})}\n  function toast(t){let el=document.getElementById(\'v71-toast\')||document.getElementById(\'v72-toast\'); if(!el){el=document.createElement(\'div\');el.id=\'v72-toast\';el.className=\'v71-toast\';document.body.appendChild(el)} el.textContent=t; el.classList.add(\'show\'); setTimeout(function(){el.classList.remove(\'show\')},1400)}\n  function findDevisBox(){\n    const hs=[...document.querySelectorAll(\'h1,h2,h3\')].filter(function(h){return /demande de devis rapide/i.test(h.textContent||\'\')});\n    if(hs[0]) return hs[0].closest(\'section,article,form,div\') || hs[0].parentElement;\n    const selects=[...document.querySelectorAll(\'select\')];\n    const s=selects.find(function(x){return [...x.options].some(function(o){return /salopette|tenue agent|bouchons|casque|gants|lunettes/i.test(o.textContent||\'\')})});\n    return s ? (s.closest(\'section,article,form,div\') || s.parentElement) : null;\n  }\n  function getCategory(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    return selects[0]?.value || \'Catégorie non précisée\';\n  }\n  function getColorAndDetails(box){\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const colorInput=inputs.find(function(i){return /couleur|noir|bleu|gris|rouge/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const textarea=box.querySelector(\'textarea\');\n    return {color:colorInput?.value||\'\',details:textarea?.value||\'\'};\n  }\n  function findProductSelect(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    return selects.find(function(s,idx){\n      if(idx===0) return false;\n      const text=[...s.options].map(function(o){return o.textContent||\'\'}).join(\' \');\n      return /salopette|tenue agent|bouchons|casque|gants|lunettes|masque|gilet|harnais|tablier|manchettes|polo|t-shirt|chaussures/i.test(text);\n    });\n  }\n  function optionProducts(select){\n    if(!select) return [];\n    return [...select.options].map(function(o){return (o.textContent||o.value||\'\').trim()}).filter(function(t){\n      return t && !/choisir|sélectionner|choose|produit$/i.test(t);\n    });\n  }\n  function addProduct(box,name){\n    load();\n    quantities[name]=(quantities[name]||0)+1;\n    save();\n    const info=getColorAndDetails(box);\n    let meta=[\'Catégorie: \'+getCategory(box)];\n    if(info.color) meta.push(\'Couleur: \'+info.color);\n    if(info.details) meta.push(\'Détails: \'+info.details);\n    if(window.v69AddToCart) window.v69AddToCart(name,meta.join(\' — \'),\'\');\n    renderRows(box);\n    toast(name+\' ajouté — Qté \'+quantities[name]);\n  }\n  function renderRows(box){\n    const holder=document.getElementById(\'v72-product-list\'); if(!holder) return;\n    const products=optionProducts(findProductSelect(box));\n    holder.innerHTML=products.map(function(name){\n      const q=quantities[name]||0;\n      return \'<div class="v72-product-row"><div><span class="v72-product-name">\'+esc(name)+\'</span><span class="v72-product-meta">Cliquez + pour ajouter / augmenter quantité</span></div><div class="v72-plus-area"><span class="v72-product-qty">\'+q+\'</span><button class="v72-plus-btn" type="button" data-v72-product="\'+esc(name)+\'">+</button></div></div>\';\n    }).join(\'\');\n    holder.querySelectorAll(\'.v72-plus-btn\').forEach(function(btn){btn.onclick=function(){addProduct(box,btn.getAttribute(\'data-v72-product\')||\'Produit PROTEX-DZ\')}});\n  }\n  function install(){\n    const box=findDevisBox(); if(!box) return;\n    const select=findProductSelect(box); if(!select) return;\n    select.classList.add(\'v72-hide-native-product\');\n    const parent=select.parentElement || box;\n    if(!document.getElementById(\'v72-product-picker\')){\n      const picker=document.createElement(\'div\');\n      picker.id=\'v72-product-picker\';\n      picker.className=\'v72-product-picker\';\n      picker.innerHTML=\'<div class="v72-picker-title">Produits à ajouter au devis</div><p class="v72-picker-help">بدل القائمة التي تظهر بدوائر اختيار، اضغط + أمام كل منتج. كل ضغطة تزيد الكمية وتضاف إلى Panier de devis.</p><div id="v72-product-list" class="v72-product-list"></div>\';\n      parent.appendChild(picker);\n    }\n    renderRows(box);\n  }\n  load();\n  if(document.readyState===\'loading\') document.addEventListener(\'DOMContentLoaded\',install); else install();\n  setInterval(install,1500);\n})();\n'; document.body.appendChild(sc4); const sc5=document.createElement('script'); sc5.textContent='\n(function(){\n  const V73_STORE=\'protexdz_v73_cart\';\n  const WHATSAPP=\'353899546099\';\n  let cart=[];\n  function load(){try{cart=JSON.parse(localStorage.getItem(V73_STORE)||\'[]\')}catch(e){cart=[]}}\n  function save(){localStorage.setItem(V73_STORE,JSON.stringify(cart)); renderPanier();}\n  function esc(s){return String(s||\'\').replace(/[&<>"]/g,function(m){return {\'&\':\'&amp;\',\'<\':\'&lt;\',\'>\':\'&gt;\',\'"\':\'&quot;\'}[m]})}\n  function toast(t){let el=document.getElementById(\'v73-toast\')||document.getElementById(\'v71-toast\'); if(!el){el=document.createElement(\'div\');el.id=\'v73-toast\';el.className=\'v71-toast\';document.body.appendChild(el)} el.textContent=t; el.classList.add(\'show\'); setTimeout(function(){el.classList.remove(\'show\')},1400)}\n  function findDevisBox(){\n    const heads=[...document.querySelectorAll(\'h1,h2,h3\')].filter(function(h){return /demande de devis rapide/i.test(h.textContent||\'\')});\n    if(heads[0]) return heads[0].closest(\'section,article,form,div\') || heads[0].parentElement;\n    const pick=document.getElementById(\'v72-product-picker\');\n    return pick ? (pick.closest(\'section,article,form,div\') || pick.parentElement) : null;\n  }\n  function findProductSelect(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    return selects.find(function(s,idx){\n      if(idx===0) return false;\n      const text=[...s.options].map(function(o){return o.textContent||\'\'}).join(\' \');\n      return /salopette|tenue agent|bouchons|casque|gants|lunettes|masque|gilet|harnais|tablier|manchettes|polo|t-shirt|chaussures|combinaison/i.test(text);\n    });\n  }\n  function getProducts(box){\n    const sel=findProductSelect(box);\n    if(!sel) return [];\n    return [...sel.options].map(function(o){return (o.textContent||o.value||\'\').trim()}).filter(function(t){return t && !/choisir|sélectionner|choose|produit$/i.test(t)});\n  }\n  function readMeta(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const colorInput=inputs.find(function(i){return /couleur|noir|bleu|gris|rouge/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const details=box.querySelector(\'textarea\')?.value||\'\';\n    let meta=[];\n    if(selects[0]?.value) meta.push(\'Catégorie: \'+selects[0].value);\n    const pack=selects[2]?.value||\'\';\n    if(pack && !/choisissez/i.test(pack)) meta.push(\'Pack: \'+pack);\n    if(colorInput?.value) meta.push(\'Couleur: \'+colorInput.value);\n    if(details) meta.push(\'Détails: \'+details);\n    return meta.join(\' — \');\n  }\n  function addToCart(name,meta){\n    load();\n    const key=(name+\'|\'+(meta||\'\')).toLowerCase();\n    const found=cart.find(function(x){return x.key===key});\n    if(found) found.qty+=1; else cart.push({key:key,name:name,meta:meta||\'\',qty:1});\n    save();\n    if(window.v69AddToCart) window.v69AddToCart(name,meta||\'\',\'\');\n    toast(name+\' ajouté\');\n  }\n  function hideStandaloneQty(box){\n    const inputs=[...box.querySelectorAll(\'input\')];\n    inputs.forEach(function(i){\n      const full=((i.type||\'\')+\' \'+(i.placeholder||\'\')+\' \'+(i.name||\'\')+\' \'+(i.id||\'\')+\' \'+(i.value||\'\')).toLowerCase();\n      if(i.closest(\'.v73-contact-fields\')) return;\n      if(i.type===\'number\' || /quantit|quantity/.test(full) || (/^\\d+$/.test(i.value||\'\') && i.offsetWidth<180)){\n        const wrapper=i.closest(\'.v71-devis-plus-wrap\') || i.parentElement;\n        if(wrapper) wrapper.classList.add(\'v73-hide-qty-field\'); else i.classList.add(\'v73-hide-qty-field\');\n      }\n      i.addEventListener(\'input\',function(){\n        if(i.type===\'number\' || /quantit|quantity/.test(full)){\n          i.value=String(i.value).replace(/[^\\d]/g,\'\').slice(0,4);\n        }\n      });\n      i.classList.add(\'v73-clean-input\');\n    });\n    [...box.querySelectorAll(\'label,h4,h3,div,span\')].forEach(function(el){\n      if(el.children.length===0 && /^quantité$/i.test((el.textContent||\'\').trim())) el.classList.add(\'v73-hide-qty-field\');\n    });\n  }\n  function setupPicker(box){\n    const picker=document.getElementById(\'v72-product-picker\');\n    const list=document.getElementById(\'v72-product-list\');\n    if(!picker || !list) return;\n    if(!document.getElementById(\'v73-toggle-products\')){\n      picker.classList.add(\'v73-collapsed\');\n      const btn=document.createElement(\'button\');\n      btn.type=\'button\'; btn.id=\'v73-toggle-products\'; btn.className=\'v73-toggle-products\';\n      btn.innerHTML=\'<span>Choisir produits à ajouter</span><span>+</span>\';\n      btn.onclick=function(){\n        picker.classList.toggle(\'v73-collapsed\');\n        btn.querySelector(\'span:last-child\').textContent=picker.classList.contains(\'v73-collapsed\')?\'+\':\'−\';\n      };\n      const title=picker.querySelector(\'.v72-picker-title\');\n      if(title) title.replaceWith(btn); else picker.insertBefore(btn,picker.firstChild);\n      const help=picker.querySelector(\'.v72-picker-help\');\n      if(help) help.textContent=\'اضغط فتح، اختر المنتج من القائمة، ثم اضغط + أمام المنتج. كل ضغطة تزيد الكمية وتظهر في Panier de devis.\';\n      const count=document.createElement(\'div\');\n      count.id=\'v73-product-count\'; count.className=\'v73-product-count\';\n      picker.insertBefore(count,list);\n    }\n    const count=document.getElementById(\'v73-product-count\');\n    if(count) count.textContent=\'Nombre de produits disponibles: \'+getProducts(box).length;\n    // Rebuild rows so all products show with our V73 add behavior\n    const products=getProducts(box);\n    if(products.length){\n      list.innerHTML=products.map(function(name){\n        const currentQty=(cart.find(function(x){return x.name===name})||{}).qty||0;\n        return \'<div class="v72-product-row"><div><span class="v72-product-name">\'+esc(name)+\'</span><span class="v72-product-meta">+ pour ajouter ou augmenter la quantité</span></div><div class="v72-plus-area"><span class="v72-product-qty" data-v73-qty="\'+esc(name)+\'">\'+currentQty+\'</span><button class="v72-plus-btn" type="button" data-v73-add="\'+esc(name)+\'">+</button></div></div>\';\n      }).join(\'\');\n      list.querySelectorAll(\'[data-v73-add]\').forEach(function(btn){\n        btn.onclick=function(e){e.preventDefault(); e.stopPropagation(); addToCart(btn.getAttribute(\'data-v73-add\'),readMeta(box)); setupPicker(box);};\n      });\n    }\n  }\n  function addContactFields(box){\n    if(document.getElementById(\'v73-contact-fields\')) return;\n    const companyInput=[...box.querySelectorAll(\'input\')].find(function(i){return /entreprise|nom|soci/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))});\n    const wrap=document.createElement(\'div\');\n    wrap.id=\'v73-contact-fields\';\n    wrap.className=\'v73-contact-fields\';\n    wrap.innerHTML=\'<div><label>Numéro téléphone société</label><input id="v73-company-phone" inputmode="tel" placeholder="Ex. 0555 00 00 00"></div><div><label>Email société</label><input id="v73-company-email" type="email" placeholder="exemple@entreprise.com"></div>\';\n    const target=companyInput?.parentElement || box.querySelector(\'textarea\')?.parentElement || box;\n    target.insertAdjacentElement(\'afterend\',wrap);\n  }\n  function renderPanier(){\n    const mini=document.getElementById(\'v71-quick-list\') || document.getElementById(\'v70-quick-list\');\n    if(mini){\n      load();\n      if(!cart.length){mini.innerHTML=\'<div class="v69-empty">Panier de devis vide. Ouvrez la liste produits puis appuyez sur +.</div>\'; return;}\n      mini.innerHTML=cart.map(function(it,i){return \'<div class="v71-quick-item"><div><strong>\'+esc(it.name)+\'</strong><small>\'+esc(it.meta||\'Produit sélectionné\')+\'</small></div><div>Qté \'+it.qty+\'</div><button class="v71-remove" type="button" data-v73-remove="\'+i+\'">×</button></div>\'}).join(\'\');\n      mini.querySelectorAll(\'[data-v73-remove]\').forEach(function(b){b.onclick=function(){load(); cart.splice(parseInt(b.getAttribute(\'data-v73-remove\'),10),1); save();}});\n    }\n  }\n  function overrideSend(box){\n    const buttons=[...box.querySelectorAll(\'button,a\')].filter(function(b){return /envoyer|whatsapp/i.test((b.textContent||\'\'))});\n    buttons.forEach(function(b){\n      if(b.dataset.v73send) return;\n      b.dataset.v73send=\'1\';\n      b.addEventListener(\'click\',function(e){\n        e.preventDefault(); e.stopPropagation();\n        load();\n        const company=[...box.querySelectorAll(\'input\')].find(function(i){return /entreprise|nom|soci/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\'))})?.value||\'Non précisé\';\n        const phone=document.getElementById(\'v73-company-phone\')?.value||\'Non précisé\';\n        const email=document.getElementById(\'v73-company-email\')?.value||\'Non précisé\';\n        const details=box.querySelector(\'textarea\')?.value||\'Non précisé\';\n        const lines=(cart.length?cart:[{name:\'Demande générale\',qty:1,meta:readMeta(box)}]).map(function(x,i){return (i+1)+\'. \'+x.name+\' — Qté: \'+x.qty+(x.meta?\' — \'+x.meta:\'\')}).join(\'\\\\n\');\n        const msg=\'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\\\\n\\\\nSociété / client: \'+company+\'\\\\nTéléphone société: \'+phone+\'\\\\nEmail société: \'+email+\'\\\\n\\\\nProduits demandés:\\\\n\'+lines+\'\\\\n\\\\nDétails supplémentaires:\\\\n\'+details+\'\\\\n\\\\nPage: \'+location.href;\n        window.open(\'https://wa.me/\'+WHATSAPP+\'?text=\'+encodeURIComponent(msg),\'_blank\',\'noopener\');\n      },true);\n    });\n  }\n  function boot(){\n    const box=findDevisBox(); if(!box) return;\n    load();\n    hideStandaloneQty(box);\n    addContactFields(box);\n    setupPicker(box);\n    renderPanier();\n    overrideSend(box);\n  }\n  if(document.readyState===\'loading\') document.addEventListener(\'DOMContentLoaded\',boot); else boot();\n  setInterval(boot,1200);\n})();\n'; document.body.appendChild(sc5); const sc6=document.createElement('script'); sc6.textContent="\n(function(){\n  const WHATSAPP='353899546099';\n  function findDevisBox(){\n    const heads=[...document.querySelectorAll('h1,h2,h3')].filter(h=>/demande de devis rapide/i.test(h.textContent||''));\n    if(heads[0]) return heads[0].closest('section,article,form,div') || heads[0].parentElement;\n    const p=document.getElementById('v72-product-picker');\n    return p ? (p.closest('section,article,form,div') || p.parentElement) : null;\n  }\n  function getText(el){return (el.textContent||'').trim().toLowerCase();}\n  function escMsg(s){return String(s||'Non précisé').trim() || 'Non précisé'}\n  function readCartFromVisible(){\n    const rows=[...document.querySelectorAll('#v71-quick-list .v71-quick-item,#v70-quick-list .v70-quick-item,.v71-quick-item')];\n    const lines=[];\n    rows.forEach((r,i)=>{\n      const name=(r.querySelector('strong')?.textContent||'Produit').trim();\n      const small=(r.querySelector('small')?.textContent||'').trim();\n      const qtyTxt=(r.textContent||'').match(/Qté\\s*([0-9]+)/i);\n      const qty=qtyTxt?qtyTxt[1]:'1';\n      if(name && !/vide|aucun/i.test(name)) lines.push((lines.length+1)+'. '+name+' — Qté: '+qty+(small?' — '+small:''));\n    });\n    return lines.join('\\n');\n  }\n  function readForm(box){\n    const inputs=[...box.querySelectorAll('input')];\n    const company=inputs.find(i=>/entreprise|nom|soci/i.test((i.placeholder||'')+(i.name||'')+(i.id||'')))?.value || '';\n    const phone=document.getElementById('v73-company-phone')?.value || inputs.find(i=>/phone|tel|télé/i.test((i.placeholder||'')+(i.name||'')+(i.id||'')))?.value || '';\n    const email=document.getElementById('v73-company-email')?.value || inputs.find(i=>/email|mail/i.test((i.placeholder||'')+(i.name||'')+(i.id||'')))?.value || '';\n    const details=box.querySelector('textarea')?.value || '';\n    const selects=[...box.querySelectorAll('select')];\n    let extra=[];\n    selects.forEach(s=>{ if(s.value && !/choisissez|choisir/i.test(s.value)) extra.push(s.value); });\n    let lines=readCartFromVisible();\n    if(!lines) lines='Demande générale — '+(extra.join(' / ')||'Produit non précisé');\n    return {company,phone,email,details,lines};\n  }\n  function buildMessage(box){\n    const f=readForm(box);\n    return 'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\\n\\n'\n      +'Société / client: '+escMsg(f.company)+'\\n'\n      +'Téléphone société: '+escMsg(f.phone)+'\\n'\n      +'Email société: '+escMsg(f.email)+'\\n\\n'\n      +'Produits demandés:\\n'+f.lines+'\\n\\n'\n      +'Détails supplémentaires:\\n'+escMsg(f.details)+'\\n\\n'\n      +'Page: '+location.href;\n  }\n  function sendWhatsApp(box){\n    const msg=buildMessage(box);\n    window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg),'_blank','noopener');\n  }\n  function sendEmail(box){\n    const f=readForm(box);\n    const subject='Demande de devis PROTEX-DZ - '+escMsg(f.company);\n    const body=buildMessage(box);\n    window.location.href='mailto:contact@protex-dz.com?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);\n  }\n  function styleAndWireButtons(){\n    const box=findDevisBox(); if(!box) return;\n\n    const picker=document.getElementById('v72-product-picker');\n    if(picker){\n      picker.style.width = window.innerWidth < 720 ? 'calc(100vw - 52px)' : '100%';\n      picker.style.maxWidth='100%';\n      picker.style.gridColumn='1 / -1';\n    }\n\n    const buttons=[...box.querySelectorAll('button,a')].filter(b=>/envoyer|whatsapp|devis/i.test(getText(b)));\n    let whatsappBtn=null, emailBtn=null;\n\n    buttons.forEach(b=>{\n      const t=getText(b);\n      if(/whatsapp/.test(t) && !whatsappBtn) whatsappBtn=b;\n      else if(/envoyer le devis|email|mail/.test(t) && !emailBtn) emailBtn=b;\n    });\n\n    if(!whatsappBtn){\n      whatsappBtn=document.createElement('button');\n      whatsappBtn.type='button';\n      const panier=document.getElementById('v71-quick-list') || document.getElementById('v70-quick-list') || box.querySelector('textarea') || box;\n      panier.insertAdjacentElement('afterend',whatsappBtn);\n    }\n    whatsappBtn.textContent='Envoyer via WhatsApp';\n    whatsappBtn.classList.add('v74-send-whatsapp');\n    whatsappBtn.onclick=function(e){e.preventDefault(); e.stopPropagation(); sendWhatsApp(box);};\n\n    if(!emailBtn){\n      emailBtn=document.createElement('button');\n      emailBtn.type='button';\n      whatsappBtn.insertAdjacentElement('afterend',emailBtn);\n    }\n    emailBtn.textContent='Envoyer via Email';\n    emailBtn.classList.add('v74-send-email');\n    emailBtn.onclick=function(e){e.preventDefault(); e.stopPropagation(); sendEmail(box);};\n\n    buttons.forEach(b=>{\n      if(b!==whatsappBtn && b!==emailBtn && /envoyer/i.test(getText(b))){\n        b.classList.add('v74-hide-duplicate-send');\n      }\n    });\n  }\n  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',styleAndWireButtons); else styleAndWireButtons();\n  setInterval(styleAndWireButtons,1200);\n})();\n"; document.body.appendChild(sc6); const sc7=document.createElement('script'); sc7.textContent='\n(function(){\n  const STORE=\'protexdz_v75_cart\';\n  const WHATSAPP=\'353899546099\';\n  let cart=[];\n  function load(){try{cart=JSON.parse(localStorage.getItem(STORE)||\'[]\')}catch(e){cart=[]}}\n  function save(){localStorage.setItem(STORE,JSON.stringify(cart)); renderCart(); syncFromCartToOld();}\n  function esc(s){return String(s||\'\').replace(/[&<>"]/g,function(m){return {\'&\':\'&amp;\',\'<\':\'&lt;\',\'>\':\'&gt;\',\'"\':\'&quot;\'}[m]})}\n  function toast(t){let el=document.getElementById(\'v75-toast\')||document.getElementById(\'v71-toast\'); if(!el){el=document.createElement(\'div\');el.id=\'v75-toast\';el.className=\'v71-toast\';document.body.appendChild(el)} el.textContent=t; el.classList.add(\'show\'); setTimeout(function(){el.classList.remove(\'show\')},1400)}\n  function findDevisBox(){\n    const h=[...document.querySelectorAll(\'h1,h2,h3\')].find(x=>/demande de devis rapide/i.test(x.textContent||\'\'));\n    if(h) return h.closest(\'section,article,form,div\') || h.parentElement;\n    const p=document.getElementById(\'v72-product-picker\');\n    return p ? (p.closest(\'section,article,form,div\') || p.parentElement) : null;\n  }\n  function findProductSelect(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    return selects.find(function(s,idx){\n      if(idx===0) return false;\n      const text=[...s.options].map(o=>o.textContent||\'\').join(\' \');\n      return /salopette|tenue agent|bouchons|casque|gants|lunettes|masque|gilet|harnais|tablier|manchettes|polo|t-shirt|chaussures|combinaison/i.test(text);\n    });\n  }\n  function products(box){\n    const sel=findProductSelect(box); if(!sel) return [];\n    return [...sel.options].map(o=>(o.textContent||o.value||\'\').trim()).filter(t=>t && !/choisir|sélectionner|choose|produit$/i.test(t));\n  }\n  function readMeta(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const color=inputs.find(i=>/couleur|noir|bleu|gris|rouge/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\')))?.value||\'\';\n    const details=box.querySelector(\'textarea\')?.value||\'\';\n    let meta=[];\n    if(selects[0]?.value) meta.push(\'Catégorie: \'+selects[0].value);\n    const pack=selects[2]?.value||\'\';\n    if(pack && !/choisissez|choisir/i.test(pack)) meta.push(\'Pack: \'+pack);\n    if(color) meta.push(\'Couleur: \'+color);\n    if(details) meta.push(\'Détails: \'+details);\n    return meta.join(\' — \');\n  }\n  function add(name,box){\n    load();\n    const meta=readMeta(box);\n    const key=(name+\'|\'+meta).toLowerCase();\n    const f=cart.find(x=>x.key===key);\n    if(f) f.qty++; else cart.push({key,name,meta,qty:1});\n    save();\n    if(window.v69AddToCart) window.v69AddToCart(name,meta,\'\');\n    toast(name+\' +1\');\n  }\n  function minus(name,box){\n    load();\n    const meta=readMeta(box);\n    const key=(name+\'|\'+meta).toLowerCase();\n    let f=cart.find(x=>x.key===key);\n    if(!f){\n      f=cart.find(x=>x.name===name);\n    }\n    if(f){f.qty--; if(f.qty<=0) cart=cart.filter(x=>x!==f); save(); toast(name+\' -1\');}\n  }\n  function qtyFor(name,box){\n    const meta=readMeta(box);\n    const key=(name+\'|\'+meta).toLowerCase();\n    const f=cart.find(x=>x.key===key) || cart.find(x=>x.name===name);\n    return f?f.qty:0;\n  }\n  function rebuildProductList(box){\n    const picker=document.getElementById(\'v72-product-picker\');\n    const list=document.getElementById(\'v72-product-list\');\n    if(!picker || !list) return;\n    picker.style.width=\'100%\'; picker.style.maxWidth=\'100%\'; picker.style.boxSizing=\'border-box\';\n    const arr=products(box);\n    list.innerHTML=arr.map(name=>{\n      const q=qtyFor(name,box);\n      return \'<div class="v72-product-row"><div><span class="v72-product-name">\'+esc(name)+\'</span><span class="v72-product-meta">+ pour augmenter / − pour diminuer</span></div><div class="v75-qty-controls"><button class="v75-minus-btn" type="button" data-v75-minus="\'+esc(name)+\'">−</button><span class="v75-product-qty">\'+q+\'</span><button class="v75-plus-btn" type="button" data-v75-plus="\'+esc(name)+\'">+</button></div></div>\';\n    }).join(\'\');\n    list.querySelectorAll(\'[data-v75-plus]\').forEach(b=>b.onclick=function(e){e.preventDefault();e.stopPropagation();add(b.getAttribute(\'data-v75-plus\'),box);});\n    list.querySelectorAll(\'[data-v75-minus]\').forEach(b=>b.onclick=function(e){e.preventDefault();e.stopPropagation();minus(b.getAttribute(\'data-v75-minus\'),box);});\n  }\n  function getForm(box){\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const company=inputs.find(i=>/entreprise|nom|soci/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\')))?.value||\'Non précisé\';\n    const phone=document.getElementById(\'v73-company-phone\')?.value || \'Non précisé\';\n    const email=document.getElementById(\'v73-company-email\')?.value || \'Non précisé\';\n    const details=box.querySelector(\'textarea\')?.value || \'Non précisé\';\n    return {company,phone,email,details};\n  }\n  function message(box){\n    load();\n    const f=getForm(box);\n    const lines=(cart.length?cart:[{name:\'Demande générale\',qty:1,meta:readMeta(box)}]).map((x,i)=>(i+1)+\'. \'+x.name+\' — Qté: \'+x.qty+(x.meta?\' — \'+x.meta:\'\')).join(\'\\n\');\n    return \'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\\n\\n\'\n      +\'Société / client: \'+f.company+\'\\n\'\n      +\'Téléphone société: \'+f.phone+\'\\n\'\n      +\'Email société: \'+f.email+\'\\n\\n\'\n      +\'Produits demandés:\\n\'+lines+\'\\n\\n\'\n      +\'Détails supplémentaires:\\n\'+f.details+\'\\n\\n\'\n      +\'Page: \'+location.href;\n  }\n  function sendWA(box){window.open(\'https://wa.me/\'+WHATSAPP+\'?text=\'+encodeURIComponent(message(box)),\'_blank\',\'noopener\');}\n  function sendEmail(box){\n    const f=getForm(box);\n    window.location.href=\'mailto:contact@protex-dz.com?subject=\'+encodeURIComponent(\'Demande de devis PROTEX-DZ - \'+f.company)+\'&body=\'+encodeURIComponent(message(box));\n  }\n  async function copyDevis(box){\n    const txt=message(box);\n    try{await navigator.clipboard.writeText(txt); toast(\'Devis copié\');}\n    catch(e){const ta=document.createElement(\'textarea\');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand(\'copy\');ta.remove();toast(\'Devis copié\');}\n  }\n  function renderCart(){\n    const list=document.getElementById(\'v71-quick-list\') || document.getElementById(\'v70-quick-list\');\n    if(!list) return;\n    load();\n    if(!cart.length){list.innerHTML=\'<div class="v69-empty">Panier de devis vide. Ouvrez la liste puis appuyez sur +.</div>\'; return;}\n    list.innerHTML=cart.map((x,i)=>\'<div class="v71-quick-item"><div><strong>\'+esc(x.name)+\'</strong><small>\'+esc(x.meta||\'Produit sélectionné\')+\'</small></div><div>Qté \'+x.qty+\'</div><button class="v71-remove" type="button" data-v75-remove="\'+i+\'">×</button></div>\').join(\'\');\n    list.querySelectorAll(\'[data-v75-remove]\').forEach(b=>b.onclick=function(){load(); cart.splice(parseInt(b.getAttribute(\'data-v75-remove\'),10),1); save();});\n  }\n  function syncFromCartToOld(){\n    // Keep the visible panier correct even if older scripts also exist.\n  }\n  function placeActions(box){\n    const panierTitle=[...box.querySelectorAll(\'h1,h2,h3\')].find(h=>/panier du devis/i.test(h.textContent||\'\'));\n    const panier=panierTitle ? (panierTitle.closest(\'section,article,div\') || panierTitle.parentElement) : (document.getElementById(\'v71-quick-list\')?.closest(\'div\') || null);\n    if(!panier || document.getElementById(\'v75-panier-actions\')) return;\n    const actions=document.createElement(\'div\');\n    actions.id=\'v75-panier-actions\';\n    actions.className=\'v75-panier-actions\';\n    actions.innerHTML=\'<button type="button" class="v75-send-wa">Envoyer via WhatsApp</button><button type="button" class="v75-send-email">Envoyer par Email</button><button type="button" class="v75-copy">Copier le devis</button><div class="v75-panier-note">Tous les produits du panier seront inclus avec quantités et détails.</div>\';\n    const list=document.getElementById(\'v71-quick-list\') || document.getElementById(\'v70-quick-list\') || panier;\n    list.insertAdjacentElement(\'afterend\',actions);\n    actions.querySelector(\'.v75-send-wa\').onclick=()=>sendWA(box);\n    actions.querySelector(\'.v75-send-email\').onclick=()=>sendEmail(box);\n    actions.querySelector(\'.v75-copy\').onclick=()=>copyDevis(box);\n  }\n  function hideOutsideButtons(box){\n    [...box.querySelectorAll(\'button,a\')].forEach(b=>{\n      if(b.closest(\'#v75-panier-actions\')) return;\n      const t=(b.textContent||\'\').toLowerCase();\n      if(/envoyer via|envoyer par email|copier le devis|envoyer le devis|envoyer tout le devis/.test(t)){\n        b.classList.add(\'v75-hide-outside\');\n      }\n    });\n  }\n  function fullWidth(box){\n    const card=box.closest(\'section,article,div\') || box;\n    if(window.innerWidth<720){\n      card.style.width=\'calc(100vw - 24px)\';\n      card.style.maxWidth=\'calc(100vw - 24px)\';\n      card.style.marginLeft=\'12px\';\n      card.style.marginRight=\'12px\';\n      card.style.boxSizing=\'border-box\';\n      card.style.overflow=\'hidden\';\n      [...box.querySelectorAll(\'input,select,textarea\')].forEach(el=>{el.style.maxWidth=\'100%\'; el.style.boxSizing=\'border-box\';});\n    }\n  }\n  function boot(){\n    const box=findDevisBox(); if(!box) return;\n    load();\n    fullWidth(box);\n    rebuildProductList(box);\n    renderCart();\n    placeActions(box);\n    hideOutsideButtons(box);\n  }\n  if(document.readyState===\'loading\') document.addEventListener(\'DOMContentLoaded\',boot); else boot();\n  setInterval(boot,1200);\n})();\n'; document.body.appendChild(sc7); const sc8=document.createElement('script'); sc8.textContent='\n(function(){\n  const STORE=\'protexdz_v76_stable_cart\';\n  const WHATSAPP=\'353899546099\';\n  let cart=[];\n  let booted=false;\n\n  function load(){try{cart=JSON.parse(localStorage.getItem(STORE)||\'[]\')}catch(e){cart=[]}}\n  function save(){localStorage.setItem(STORE,JSON.stringify(cart));}\n  function esc(s){return String(s||\'\').replace(/[&<>"]/g,function(m){return {\'&\':\'&amp;\',\'<\':\'&lt;\',\'>\':\'&gt;\',\'"\':\'&quot;\'}[m]})}\n  function toast(t){let el=document.getElementById(\'v76-toast\')||document.getElementById(\'v71-toast\'); if(!el){el=document.createElement(\'div\');el.id=\'v76-toast\';el.className=\'v71-toast\';document.body.appendChild(el)} el.textContent=t; el.classList.add(\'show\'); setTimeout(function(){el.classList.remove(\'show\')},1200)}\n  function findDevisBox(){\n    const h=[...document.querySelectorAll(\'h1,h2,h3\')].find(x=>/demande de devis rapide/i.test(x.textContent||\'\'));\n    if(h) return h.closest(\'section,article,form,div\') || h.parentElement;\n    return null;\n  }\n  function nativeProductSelect(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    return selects.find(function(s,idx){\n      if(idx===0) return false;\n      const text=[...s.options].map(o=>o.textContent||\'\').join(\' \');\n      return /salopette|tenue agent|bouchons|casque|gants|lunettes|masque|gilet|harnais|tablier|manchettes|polo|t-shirt|chaussures|combinaison/i.test(text);\n    });\n  }\n  function products(box){\n    const s=nativeProductSelect(box);\n    if(!s) return [];\n    return [...s.options].map(o=>(o.textContent||o.value||\'\').trim()).filter(t=>t && !/choisir|sélectionner|choose|produit$/i.test(t));\n  }\n  function meta(box){\n    const selects=[...box.querySelectorAll(\'select\')];\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const color=inputs.find(i=>/couleur|noir|bleu|gris|rouge/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\')))?.value||\'\';\n    const details=box.querySelector(\'textarea\')?.value||\'\';\n    let out=[];\n    if(selects[0]?.value) out.push(\'Catégorie: \'+selects[0].value);\n    const pack=selects[2]?.value||\'\';\n    if(pack && !/choisissez|choisir/i.test(pack)) out.push(\'Pack: \'+pack);\n    if(color) out.push(\'Couleur: \'+color);\n    if(details) out.push(\'Détails: \'+details);\n    return out.join(\' — \');\n  }\n  function qtyFor(name){\n    load();\n    return cart.filter(x=>x.name===name).reduce((s,x)=>s+(x.qty||0),0);\n  }\n  function add(name,box){\n    load();\n    const m=meta(box);\n    const key=(name+\'|\'+m).toLowerCase();\n    let f=cart.find(x=>x.key===key);\n    if(f) f.qty+=1; else cart.push({key:key,name:name,meta:m,qty:1});\n    save();\n    render(box);\n    toast(name+\' +1\');\n  }\n  function minus(name,box){\n    load();\n    const m=meta(box);\n    const key=(name+\'|\'+m).toLowerCase();\n    let f=cart.find(x=>x.key===key) || cart.find(x=>x.name===name);\n    if(f){f.qty-=1; if(f.qty<=0) cart=cart.filter(x=>x!==f); save(); render(box); toast(name+\' -1\');}\n  }\n  function form(box){\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const company=inputs.find(i=>/entreprise|nom|soci/i.test((i.placeholder||\'\')+(i.name||\'\')+(i.id||\'\')))?.value||\'Non précisé\';\n    const phone=document.getElementById(\'v73-company-phone\')?.value||\'Non précisé\';\n    const email=document.getElementById(\'v73-company-email\')?.value||\'Non précisé\';\n    const details=box.querySelector(\'textarea\')?.value||\'Non précisé\';\n    return {company,phone,email,details};\n  }\n  function message(box){\n    load();\n    const f=form(box);\n    const lines=(cart.length?cart:[{name:\'Demande générale\',qty:1,meta:meta(box)}]).map((x,i)=>(i+1)+\'. \'+x.name+\' — Qté: \'+x.qty+(x.meta?\' — \'+x.meta:\'\')).join(\'\\n\');\n    return \'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\\n\\n\'\n      +\'Société / client: \'+f.company+\'\\n\'\n      +\'Téléphone société: \'+f.phone+\'\\n\'\n      +\'Email société: \'+f.email+\'\\n\\n\'\n      +\'Produits demandés:\\n\'+lines+\'\\n\\n\'\n      +\'Détails supplémentaires:\\n\'+f.details+\'\\n\\n\'\n      +\'Page: \'+location.href;\n  }\n  function ensureShell(box){\n    if(!box.id) box.id=\'v76-devis-shell\';\n    else box.dataset.v76oldid=box.id, box.id=\'v76-devis-shell\';\n    box.style.boxSizing=\'border-box\';\n    if(window.innerWidth<720){\n      box.style.width=\'calc(100vw - 36px)\';\n      box.style.maxWidth=\'calc(100vw - 36px)\';\n      box.style.marginLeft=\'18px\';\n      box.style.marginRight=\'18px\';\n      box.style.overflow=\'hidden\';\n    }\n  }\n  function install(box){\n    ensureShell(box);\n    const select=nativeProductSelect(box);\n    if(select) select.classList.add(\'v76-hide-native\');\n    const oldPicker=document.getElementById(\'v72-product-picker\');\n    if(oldPicker) oldPicker.style.display=\'none\';\n    if(!document.getElementById(\'v76-product-picker\')){\n      const picker=document.createElement(\'div\');\n      picker.id=\'v76-product-picker\';\n      picker.innerHTML=\'<button id="v76-toggle" type="button"><span>Choisir produits à ajouter</span><b>+</b></button><div id="v76-help">اضغط فتح، اختر المنتج من القائمة، ثم اضغط + للزيادة أو − للنقصان. الكمية تبقى ثابتة في Panier du devis.</div><div id="v76-count"></div><div id="v76-list"></div>\';\n      const label=[...box.querySelectorAll(\'label,h3,h4,div\')].find(x=>/^produit$/i.test((x.textContent||\'\').trim()));\n      if(label && label.parentElement) label.insertAdjacentElement(\'afterend\',picker); else (select?.parentElement||box).appendChild(picker);\n      picker.querySelector(\'#v76-toggle\').onclick=function(){\n        picker.classList.toggle(\'open\');\n        picker.querySelector(\'b\').textContent=picker.classList.contains(\'open\')?\'−\':\'+\';\n      };\n    }\n    if(!document.getElementById(\'v76-panier\')){\n      const panier=document.createElement(\'div\');\n      panier.id=\'v76-panier\';\n      panier.innerHTML=\'<h3>Panier du devis</h3><p>Tous les produits choisis apparaissent ici avec les quantités et les détails.</p><div id="v76-cart-list"></div><div class="v76-actions"><button type="button" class="v76-wa">Envoyer via WhatsApp</button><button type="button" class="v76-email">Envoyer par Email</button><button type="button" class="v76-copy">Copier le devis</button></div>\';\n      const details=box.querySelector(\'textarea\')?.parentElement || box;\n      details.insertAdjacentElement(\'afterend\',panier);\n      panier.querySelector(\'.v76-wa\').onclick=function(){window.open(\'https://wa.me/\'+WHATSAPP+\'?text=\'+encodeURIComponent(message(box)),\'_blank\',\'noopener\')};\n      panier.querySelector(\'.v76-email\').onclick=function(){const f=form(box); window.location.href=\'mailto:contact@protex-dz.com?subject=\'+encodeURIComponent(\'Demande de devis PROTEX-DZ - \'+f.company)+\'&body=\'+encodeURIComponent(message(box));};\n      panier.querySelector(\'.v76-copy\').onclick=async function(){try{await navigator.clipboard.writeText(message(box)); toast(\'Devis copié\');}catch(e){toast(\'Copie non disponible\');}};\n    }\n    [...box.querySelectorAll(\'button,a\')].forEach(b=>{\n      if(b.closest(\'#v76-product-picker,#v76-panier\')) return;\n      if(/envoyer|copier/i.test((b.textContent||\'\').toLowerCase())) b.style.display=\'none\';\n    });\n  }\n  function render(box){\n    load();\n    const arr=products(box);\n    const list=document.getElementById(\'v76-list\');\n    const count=document.getElementById(\'v76-count\');\n    if(count) count.textContent=\'Nombre de produits disponibles: \'+arr.length;\n    if(list){\n      list.innerHTML=arr.map(name=>\'<div class="v76-row"><div><span class="v76-name">\'+esc(name)+\'</span><span class="v76-meta">+ pour augmenter / − pour diminuer</span></div><div class="v76-controls"><button class="v76-minus" type="button" data-v76-minus="\'+esc(name)+\'">−</button><span class="v76-qty">\'+qtyFor(name)+\'</span><button class="v76-plus" type="button" data-v76-plus="\'+esc(name)+\'">+</button></div></div>\').join(\'\');\n      list.querySelectorAll(\'[data-v76-plus]\').forEach(b=>b.onclick=function(e){e.preventDefault();e.stopPropagation();add(b.getAttribute(\'data-v76-plus\'),box)});\n      list.querySelectorAll(\'[data-v76-minus]\').forEach(b=>b.onclick=function(e){e.preventDefault();e.stopPropagation();minus(b.getAttribute(\'data-v76-minus\'),box)});\n    }\n    const cl=document.getElementById(\'v76-cart-list\');\n    if(cl){\n      if(!cart.length){cl.innerHTML=\'<div class="v69-empty">Panier vide. Ouvrez la liste puis appuyez sur +.</div>\';}\n      else cl.innerHTML=cart.map((x,i)=>\'<div class="v76-cart-row"><div><strong>\'+esc(x.name)+\'</strong><small>\'+esc(x.meta||\'Produit sélectionné\')+\'</small></div><div>Qté \'+x.qty+\'</div><button class="v76-remove" type="button" data-v76-remove="\'+i+\'">×</button></div>\').join(\'\');\n      cl.querySelectorAll(\'[data-v76-remove]\').forEach(b=>b.onclick=function(){load();cart.splice(parseInt(b.getAttribute(\'data-v76-remove\'),10),1);save();render(box)});\n    }\n  }\n  function boot(){\n    const box=findDevisBox(); if(!box) return;\n    if(!booted){\n      // reset old moving quantities from earlier experimental stores once for this V76 version\n      [\'protexdz_v72_product_quantities\',\'protexdz_v73_cart\',\'protexdz_v75_cart\'].forEach(k=>localStorage.removeItem(k));\n      booted=true;\n    }\n    install(box);\n    render(box);\n  }\n  if(document.readyState===\'loading\') document.addEventListener(\'DOMContentLoaded\',boot); else boot();\n  setInterval(boot,900);\n})();\n'; document.body.appendChild(sc8); const sc9=document.createElement('script'); sc9.textContent='\n(function(){\n  const WHATSAPP=\'353899546099\';\n  const COMPANY_EMAIL=\'contact@protex-dz.com\';\n  const NL=String.fromCharCode(10);\n\n  function findDevisBox(){\n    const h=[...document.querySelectorAll(\'h1,h2,h3\')].find(x=>/demande de devis rapide/i.test(x.textContent||\'\'));\n    if(h) return h.closest(\'section,article,form,div\') || h.parentElement;\n    return document.getElementById(\'v76-devis-shell\') || document.body;\n  }\n  function clean(s){return String(s||\'\').replace(/\\s+/g,\' \').trim();}\n  function inputValue(box,patterns){\n    const inputs=[...box.querySelectorAll(\'input\')];\n    const el=inputs.find(i=>patterns.some(p=>p.test((i.placeholder||\'\')+\' \'+(i.name||\'\')+\' \'+(i.id||\'\')+\' \'+(i.previousElementSibling?.textContent||\'\'))));\n    return clean(el?.value||\'\');\n  }\n  function getForm(box){\n    return {\n      company: inputValue(box,[/entreprise/i,/soci/i,/nom/i]) || \'Non précisé\',\n      phone: (document.getElementById(\'v73-company-phone\')?.value || inputValue(box,[/phone/i,/tel/i,/télé/i])) || \'Non précisé\',\n      email: (document.getElementById(\'v73-company-email\')?.value || inputValue(box,[/email/i,/mail/i])) || \'Non précisé\',\n      details: clean(box.querySelector(\'textarea\')?.value||\'\') || \'Non précisé\'\n    };\n  }\n  function readVisibleProducts(){\n    const rows=[...document.querySelectorAll(\'#v76-cart-list .v76-cart-row,#v71-quick-list .v71-quick-item,#v70-quick-list .v70-quick-item\')];\n    const out=[];\n    rows.forEach(row=>{\n      const name=clean(row.querySelector(\'strong\')?.textContent||\'\');\n      if(!name || /panier|vide|aucun/i.test(name)) return;\n      const small=clean(row.querySelector(\'small\')?.textContent||\'\');\n      let qty=\'1\';\n      const qt=(row.textContent||\'\').match(/Qté\\s*([0-9]+)/i);\n      if(qt) qty=qt[1];\n      out.push({name,qty,details:small});\n    });\n    return out;\n  }\n  function fallbackSelected(box){\n    const selects=[...box.querySelectorAll(\'select\')].map(s=>clean(s.value)).filter(v=>v && !/choisir|choisissez/i.test(v));\n    return [{name:\'Demande générale\',qty:\'1\',details:selects.join(\' / \')||\'Produit non précisé\'}];\n  }\n  function products(box){\n    const p=readVisibleProducts();\n    return p.length?p:fallbackSelected(box);\n  }\n  function tableText(box){\n    const arr=products(box);\n    let t=\'N° | Produit | Qté | Détails\'+NL;\n    t+=\'---|---------|-----|--------\'+NL;\n    arr.forEach((x,i)=>{t+=(i+1)+\' | \'+x.name+\' | \'+x.qty+\' | \'+(x.details||\'\')+NL;});\n    return t.trim();\n  }\n  function message(box){\n    const f=getForm(box);\n    return [\n      \'Bonjour PROTEX-DZ, je souhaite un devis détaillé.\',\n      \'\',\n      \'Société / client: \'+f.company,\n      \'Téléphone société: \'+f.phone,\n      \'Email société: \'+f.email,\n      \'\',\n      \'Produits demandés:\',\n      tableText(box),\n      \'\',\n      \'Détails supplémentaires:\',\n      f.details,\n      \'\',\n      \'Page: \'+location.href\n    ].join(NL);\n  }\n  function htmlEmail(box){\n    const f=getForm(box);\n    const arr=products(box);\n    const rows=arr.map((x,i)=>\'<tr><td style="padding:8px;border:1px solid #ddd">\'+(i+1)+\'</td><td style="padding:8px;border:1px solid #ddd"><b>\'+escapeHtml(x.name)+\'</b></td><td style="padding:8px;border:1px solid #ddd;text-align:center">\'+escapeHtml(x.qty)+\'</td><td style="padding:8px;border:1px solid #ddd">\'+escapeHtml(x.details||\'\')+\'</td></tr>\').join(\'\');\n    return \'<h2>Demande de devis PROTEX-DZ</h2>\'\n      +\'<p><b>Société / client:</b> \'+escapeHtml(f.company)+\'<br><b>Téléphone société:</b> \'+escapeHtml(f.phone)+\'<br><b>Email société:</b> \'+escapeHtml(f.email)+\'</p>\'\n      +\'<table style="border-collapse:collapse;width:100%;font-family:Arial,sans-serif"><thead><tr style="background:#111827;color:#ffca12"><th style="padding:8px;border:1px solid #ddd">N°</th><th style="padding:8px;border:1px solid #ddd">Produit</th><th style="padding:8px;border:1px solid #ddd">Qté</th><th style="padding:8px;border:1px solid #ddd">Détails</th></tr></thead><tbody>\'+rows+\'</tbody></table>\'\n      +\'<p><b>Détails supplémentaires:</b><br>\'+escapeHtml(f.details)+\'</p><p><b>Page:</b> \'+escapeHtml(location.href)+\'</p>\';\n  }\n  function escapeHtml(s){return String(s||\'\').replace(/[&<>"]/g,m=>({\'&\':\'&amp;\',\'<\':\'&lt;\',\'>\':\'&gt;\',\'"\':\'&quot;\'}[m]));}\n  function sendWA(box){\n    const msg=message(box);\n    // Use encodeURIComponent on text with real newline characters, not literal slash+n\n    window.open(\'https://wa.me/\'+WHATSAPP+\'?text=\'+encodeURIComponent(msg),\'_blank\',\'noopener\');\n  }\n  function sendEmail(box){\n    const subject=\'Demande de devis PROTEX-DZ - \'+getForm(box).company;\n    const body=message(box);\n    // mailto is plain text but table is aligned and readable; HTML preview is kept for copy if needed.\n    window.location.href=\'mailto:\'+COMPANY_EMAIL+\'?subject=\'+encodeURIComponent(subject)+\'&body=\'+encodeURIComponent(body);\n  }\n  async function copyDevis(box){\n    const txt=message(box);\n    try{await navigator.clipboard.writeText(txt); toast(\'Devis copié\');}\n    catch(e){const ta=document.createElement(\'textarea\'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand(\'copy\'); ta.remove(); toast(\'Devis copié\');}\n  }\n  function toast(t){\n    let el=document.getElementById(\'v77-toast\')||document.getElementById(\'v71-toast\');\n    if(!el){el=document.createElement(\'div\'); el.id=\'v77-toast\'; el.className=\'v71-toast\'; document.body.appendChild(el);}\n    el.textContent=t; el.classList.add(\'show\'); setTimeout(()=>el.classList.remove(\'show\'),1300);\n  }\n  function placeActions(box){\n    const panier=document.getElementById(\'v76-panier\') || document.getElementById(\'v71-quick-list\')?.closest(\'div\') || box;\n    if(!panier) return;\n    // Hide every old send/copy button in devis area, then add one reliable set.\n    [...box.querySelectorAll(\'button,a\')].forEach(b=>{\n      if(b.closest(\'#v77-actions\')) return;\n      const t=(b.textContent||\'\').toLowerCase();\n      if(/envoyer|whatsapp|email|copier/.test(t) && !b.closest(\'#v76-product-picker\')){\n        b.classList.add(\'v77-hidden-old-send\');\n      }\n    });\n    if(!document.getElementById(\'v77-actions\')){\n      const actions=document.createElement(\'div\');\n      actions.id=\'v77-actions\';\n      actions.className=\'v77-actions\';\n      actions.innerHTML=\'<button type="button" class="v77-wa">Envoyer via WhatsApp</button><button type="button" class="v77-email">Envoyer par Email</button><button type="button" class="v77-copy">Copier le devis</button><div id="v77-preview" class="v77-table-preview"></div>\';\n      panier.appendChild(actions);\n      actions.querySelector(\'.v77-wa\').onclick=e=>{e.preventDefault(); e.stopPropagation(); sendWA(box);};\n      actions.querySelector(\'.v77-email\').onclick=e=>{e.preventDefault(); e.stopPropagation(); sendEmail(box);};\n      actions.querySelector(\'.v77-copy\').onclick=e=>{e.preventDefault(); e.stopPropagation(); copyDevis(box);};\n    }\n    const prev=document.getElementById(\'v77-preview\');\n    if(prev) prev.textContent=tableText(box);\n  }\n  function frameFix(box){\n    if(window.innerWidth>720) return;\n    const all=[...document.querySelectorAll(\'section,article,.card,.pack-card\')];\n    all.forEach(el=>{\n      if(el.offsetWidth>window.innerWidth-20){\n        el.style.maxWidth=\'calc(100vw - 32px)\';\n        el.style.width=\'calc(100vw - 32px)\';\n        el.style.marginLeft=\'auto\';\n        el.style.marginRight=\'auto\';\n        el.style.boxSizing=\'border-box\';\n      }\n    });\n    box.style.maxWidth=\'calc(100vw - 32px)\';\n    box.style.width=\'calc(100vw - 32px)\';\n    box.style.marginLeft=\'auto\';\n    box.style.marginRight=\'auto\';\n    box.style.boxSizing=\'border-box\';\n    box.style.overflow=\'hidden\';\n  }\n  function boot(){\n    const box=findDevisBox();\n    frameFix(box);\n    place   function clean(s){return String(s||'').replace(/\s+/g,' ').trim();}
  function removeBadWords(s){
    return clean(String(s||'')
      .replace(/\bHiko\b/gi,'')
      .replace(/\bZarech\b/gi,'')
      .replace(/\bZurich\b/gi,'')
      .replace(/Couleur:\s*(?:—|-)?\s*/gi,'')
      .replace(/Détails:\s*(?:—|-)?\s*/gi,'')
      .replace(/\s*—\s*—\s*/g,' — ')
      .replace(/^\s*—\s*/,'')
      .replace(/\s*—\s*$/,'')
    );
  }
  function findBox(){
    const title=[...document.querySelectorAll('h1,h2,h3')].find(x=>/demande de devis rapide/i.test(x.textContent||''));
    return title ? (title.closest('section,article,form,div') || title.parentElement) : (document.getElementById('v76-devis-shell') || document.body);
  }
  function formData(){
    const box=findBox();
    const inputs=[...box.querySelectorAll('input')];
    function get(regs){
      const f=inputs.find(i=>regs.some(r=>r.test((i.placeholder||'')+' '+(i.name||'')+' '+(i.id||'')+' '+(i.previousElementSibling?.textContent||''))));
      return clean(f&&f.value);
    }
    return {
      company:get([/entreprise/i,/soci/i,/nom/i])||'Non précisé',
      phone:clean(document.getElementById('v73-company-phone')?.value || get([/phone/i,/tel/i,/télé/i]))||'Non précisé',
      email:clean(document.getElementById('v73-company-email')?.value || get([/email/i,/mail/i]))||'Non précisé',
      details:removeBadWords(clean(box.querySelector('textarea')?.value||''))||'Non précisé'
    };
  }
  function readProducts(){
    const rows=[...document.querySelectorAll('#v76-cart-list .v76-cart-row')];
    const arr=[];
    rows.forEach(row=>{
      const name=clean(row.querySelector('strong')?.textContent||'');
      if(!name || /vide|aucun|panier/i.test(name)) return;
      const detailsRaw=clean(row.querySelector('small')?.getAttribute('data-v106-clean') || row.querySelector('small')?.textContent || '');
      const m=(row.textContent||'').match(/Qté\s*([0-9]+)/i);
      arr.push({name,qty:m?m[1]:'1',details:removeBadWords(detailsRaw)});
    });
    return arr;
  }
  function shortName(name){
    const n=clean(name).toLowerCase();
    if(n.includes('salopette')) return 'Salopette';
    if(n.includes('combinaison')) return 'Comb trv';
    if(n.includes('tenue')) return 'Tenue trv';
    if(n.includes('gilet')) return 'Gilet trv';
    if(n.includes('tablier')) return 'Tablier';
    if(n.includes('blouse')) return 'Blouse';
    if(n.includes('polo')) return 'Polo';
    if(n.includes('t-shirt') || n.includes('tshirt')) return 'T-shirt';
    if(n.includes('casquette')) return 'Casquette';
    if(n.includes('chauss')) return 'Chaussure';
    return clean(name).replace(/ de travail/ig,' trv').replace(/travail/ig,'trv');
  }
  function sourceLabel(details){
    const d=clean(details).toLowerCase();
    if(d.includes('cover') || d.includes('import')) return 'Coverguard';
    if(d.includes('local')) return 'local';
    if(d.includes('person')) return 'personnalisé';
    if(d.includes('pack')) return 'pack';
    return '';
  }
  function productLines(){
    const products=readProducts();
    if(!products.length) return ['Aucun produit sélectionné.'];
    return products.map((p,i)=>{
      const label=sourceLabel(p.details);
      return (i+1)+'- '+shortName(p.name)+(label?' '+label:'')+'×'+p.qty;
    });
  }
  function copyText(){
    const f=formData();
    return [
      'Société / client: '+f.company,
      'Téléphone société: '+f.phone,
      'Email société: '+f.email,
      '',
      'Produits demandés:',
      productLines().join(NL),
      '',
      'Détails supplémentaires:',
      f.details
    ].join(NL);
  }
  function showManualCopy(txt){
    // Prompt is easier to select/copy than alert on Android Chrome.
    try{
      window.prompt('Copiez le devis:', txt);
    }catch(e){
      alert(txt);
    }
  }
  async function doCopy(){
    const txt=copyText();
    let copied=false;
    try{
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(txt);
        copied=true;
      }
    }catch(e){}
    if(copied){
      alert('Devis copié');
    }else{
      showManualCopy(txt);
    }
  }
  function bindCopy(){
    const buttons=[...document.querySelectorAll('button,a')].filter(b=>/copier le devis/i.test(b.textContent||''));
    buttons.forEach(btn=>{
      if(btn.dataset.v107copy) return;
      btn.dataset.v107copy='1';
      btn.addEventListener('click',function(e){
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        doCopy();
      },true);
      btn.onclick=function(e){
        e.preventDefault();
        e.stopPropagation();
        doCopy();
        return false;
      };
    });
  }
  function updatePreview(){
    const preview=document.getElementById('v104-final-preview') || document.getElementById('v99-simple-preview') || document.getElementById('v102-lines-preview');
    if(preview){
      preview.innerHTML='';
      productLines().forEach(line=>{
        const div=document.createElement('div');
        div.className='v104-line';
        div.textContent=line;
        preview.appendChild(div);
      });
    }
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',()=>{bindCopy();updatePreview();});
  }else{
    bindCopy();updatePreview();
  }
  setInterval(()=>{bindCopy();updatePreview();},700);
})();

      return clean(f&&f.value);
    }
    return {
      company:get([/entreprise/i,/soci/i,/nom/i])||'Non précisé',
      phone:clean(document.getElementById('v73-company-phone')?.value || get([/phone/i,/tel/i,/télé/i]))||'Non précisé',
      email:clean(document.getElementById('v73-company-email')?.value || get([/email/i,/mail/i]))||'Non précisé',
      details:removeBadWords(clean(box.querySelector('textarea')?.value||''))||'Non précisé'
    };
  }
  function readProducts(){
    const rows=[...document.querySelectorAll('#v76-cart-list .v76-cart-row')];
    const arr=[];
    rows.forEach(row=>{
      const name=clean(row.querySelector('strong')?.textContent||'');
      if(!name || /vide|aucun|panier/i.test(name)) return;
      let details=clean(row.querySelector('small')?.getAttribute('data-v106-clean') || row.querySelector('small')?.textContent || '');
      details=removeBadWords(details);
      if(/import/i.test(details)) details='Catégorie: import';
      else if(/cover/i.test(details)) details='Catégorie: Coverguard';
      else if(/local/i.test(details)) details='Catégorie: local';
      const m=(row.textContent||'').match(/Qté\s*([0-9]+)/i);
      arr.push({name,qty:m?m[1]:'1',details});
    });
    return arr;
  }
  function formattedWhatsappText(){
    const f=formData();
    const lines=[
      'Société / client: '+f.company,
      'Téléphone société: '+f.phone,
      'Email société: '+f.email,
      '',
      'Produits demandés:'
    ];

    const products=readProducts();
    if(!products.length){
      lines.push('Aucun produit sélectionné.');
    }else{
      products.forEach((p,i)=>{
        lines.push((i+1)+'. '+p.name);
        lines.push('Quantité: '+p.qty);
        lines.push('Détails: '+(p.details || 'Non précisé'));
        lines.push('');
      });
    }

    lines.push('Détails supplémentaires:');
    lines.push(f.details);
    return lines.join(NL);
  }
  function toast(msg){
    let el=document.getElementById('v111-toast');
    if(!el){
      el=document.createElement('div');
      el.id='v111-toast';
      el.style.cssText='position:fixed;left:50%;bottom:92px;transform:translateX(-50%);z-index:2147483647;background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font:900 14px Arial;opacity:0;transition:.2s;pointer-events:none';
      document.body.appendChild(el);
    }
    el.textContent=msg;
    el.style.opacity='1';
    setTimeout(()=>el.style.opacity='0',1600);
  }
  function sendWhatsAppClean(){
    const products=readProducts();
    if(!products.length){toast('Ajoutez au moins un produit');return;}
    const text=formattedWhatsappText();
    window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(text),'_blank','noopener');
  }
  function isWAButton(el){
    const btn=el && el.closest && el.closest('button,a');
    if(!btn) return null;
    return /envoyer via whatsapp/i.test(btn.textContent||'') ? btn : null;
  }

  // Kill old WhatsApp handlers BEFORE they run.
  window.addEventListener('click',function(e){
    const btn=isWAButton(e.target);
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
    sendWhatsAppClean();
  },true);

  window.addEventListener('touchend',function(e){
    const btn=isWAButton(e.target);
    if(!btn) return;
    e.preventDefault();
    e.stopPropagation();
    e.stopImmediatePropagation();
    sendWhatsAppClean();
  },true);

  function bindWA(){
    [...document.querySelectorAll('button,a')].forEach(btn=>{
      if(!/envoyer via whatsapp/i.test(btn.textContent||'')) return;
      btn.removeAttribute('onclick');
      btn.onclick=function(e){
        e.preventDefault();
        e.stopPropagation();
        sendWhatsAppClean();
        return false;
      };
    });
  }

  // Also override common old global senders if they exist.
  window.v69SendWhatsApp=sendWhatsAppClean;
  window.sendWA=sendWhatsAppClean;
  window.sendWhatsApp=sendWhatsAppClean;

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindWA);
  else bindWA();
  setInterval(bindWA,700);
})();
</script></body>
</html>
