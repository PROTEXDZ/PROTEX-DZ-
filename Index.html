<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PROTEX-DZ | Multi-product devis</title>
<meta name="description" content="PROTEX-DZ catalogue avec devis multi-produits, panier, téléphone, email, pack et détails complets WhatsApp.">
<style>
html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:#f6f5f1;color:#111318}#boot{min-height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}#boot .box{max-width:420px;background:#fff;border-radius:24px;padding:22px;box-shadow:0 18px 38px rgba(17,24,39,.12)}#boot b{font-size:25px;display:block;margin-bottom:8px}#fallbackFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff}.patch-note{font-size:13px;color:#667085;line-height:1.45;margin-top:8px}.patch-btn{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 18px;border-radius:999px;background:#14a94f;color:#fff;font-weight:950;text-decoration:none;margin-top:12px;border:0;cursor:pointer}
</style>
</head>
<body>
<div id="boot"><div class="box"><b>PROTEX-DZ</b><div>Chargement du catalogue avec devis multi-produits…</div><div class="patch-note">Si la page est ouverte depuis GitHub Pages, elle garde le site actuel et ajoute les nouvelles fonctions.</div></div></div>
<script>
/* PROTEX-DZ V68 patch - keeps existing website and adds multi-product quote/cart. */
const PROTEX_SOURCE_URL = 'https://protexdz.github.io/PROTEX-DZ-/';
const WHATSAPP_NUMBER = '353899546099';
const V68_CSS = `
:root{--cartYellow:#ffca12;--cartGreen:#14a94f;--cartBlack:#0f1218;--cartBg:#f6f5f1;--cartText:#111318;--cartMuted:#667085;--cartStroke:#e5e7eb;--cartShadow:0 18px 38px rgba(17,24,39,.16)}
.v68-plus-btn,.v68-color-add,.v68-pack-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;padding:0 14px;border-radius:999px;border:0;background:var(--cartYellow);color:#111;font-weight:950;font-family:Arial,Helvetica,sans-serif;box-shadow:0 8px 20px rgba(0,0,0,.12);cursor:pointer;text-decoration:none}
.v68-plus-btn{width:calc(100% - 28px);margin:0 14px 14px}.v68-plus-btn span{font-size:21px;line-height:1}.v68-plus-btn.added{background:#14a94f;color:#fff}.v68-color-add{min-height:34px;padding:0 10px;font-size:12px;margin-top:5px}.color-dot,.color-dot-item,.color-dot-item *{cursor:pointer}.color-dot-item.v68-active{transform:translateY(-2px)}.color-dot-item.v68-active .color-dot{outline:3px solid #14a94f;outline-offset:3px}.v68-cart-float{position:fixed;left:14px;right:14px;bottom:14px;z-index:999999;display:flex;gap:10px;align-items:center;justify-content:center;min-height:56px;padding:0 16px;border-radius:999px;background:#14a94f;color:#fff;font-size:17px;font-weight:950;box-shadow:0 18px 30px rgba(0,0,0,.25);text-decoration:none;border:0;cursor:pointer}.v68-cart-count{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:30px;border-radius:999px;background:#fff;color:#111;font-size:14px;font-weight:950}.v68-panel{position:fixed;inset:0;z-index:1000000;display:none;background:rgba(15,18,24,.56);backdrop-filter:blur(5px);padding:12px}.v68-panel.open{display:flex;align-items:flex-end;justify-content:center}.v68-sheet{width:min(100%,760px);max-height:92vh;overflow:auto;background:#fff;border-radius:28px;padding:18px;box-shadow:0 24px 60px rgba(0,0,0,.28)}.v68-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.v68-head h2{margin:0;font-size:25px;line-height:1;font-weight:950;letter-spacing:-.7px}.v68-close{width:42px;height:42px;border-radius:999px;border:0;background:#111;color:#fff;font-size:24px;line-height:1;cursor:pointer}.v68-help{margin:7px 0 14px;color:#667085;font-size:14px;line-height:1.45}.v68-grid{display:grid;gap:10px}.v68-field{display:grid;gap:6px}.v68-field label{font-size:13px;font-weight:900;color:#111827}.v68-field input,.v68-field select,.v68-field textarea{width:100%;border:1px solid #d9dde5;border-radius:14px;padding:13px 14px;font-size:15px;font-family:Arial,Helvetica,sans-serif;background:#fff;color:#111827;box-sizing:border-box}.v68-field textarea{min-height:86px;resize:vertical}.v68-cart-list{display:grid;gap:8px;margin:12px 0}.v68-cart-item{display:grid;grid-template-columns:1fr 82px 40px;gap:8px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:10px}.v68-cart-item strong{display:block;font-size:14px;line-height:1.2}.v68-cart-item small{display:block;color:#667085;margin-top:3px;font-size:12px}.v68-qty{display:flex;align-items:center;justify-content:center;gap:4px}.v68-qty button,.v68-remove{width:32px;height:32px;border-radius:999px;border:0;background:#111;color:#fff;font-weight:950;cursor:pointer}.v68-qty span{min-width:20px;text-align:center;font-weight:950}.v68-remove{background:#ef4444}.v68-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.v68-send{min-height:52px;border:0;border-radius:999px;background:#14a94f;color:#fff;font-weight:950;font-size:16px;cursor:pointer}.v68-clear{min-height:48px;border:1px solid #e5e7eb;border-radius:999px;background:#fff;color:#111;font-weight:950;cursor:pointer}.v68-empty{padding:14px;border:1px dashed #d9dde5;border-radius:16px;color:#667085;font-size:14px}.v68-pack-gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0 6px}.v68-pack-card{position:relative;overflow:hidden;min-height:190px;border-radius:22px;background:linear-gradient(160deg,#1f2937,#111827);color:#fff;padding:14px;box-shadow:var(--cartShadow);display:flex;flex-direction:column;justify-content:flex-end}.v68-pack-card:before{content:"";position:absolute;right:12px;top:12px;width:86px;height:146px;border-radius:46px 46px 30px 30px;background:linear-gradient(#f2c7a5 0 22%,#ffca12 22% 36%,#1f2937 36% 70%,#111 70%);box-shadow:-26px 42px 0 -23px #f2c7a5,-44px 44px 0 -26px #111,12px 130px 0 -35px #111;opacity:.95}.v68-pack-card h3{position:relative;margin:0 0 8px;font-size:17px;line-height:1.08;font-weight:950}.v68-pack-card p{position:relative;margin:0 0 10px;font-size:12px;color:#f3f4f6;line-height:1.35}.v68-pack-card button{position:relative;align-self:flex-start}.v68-email-strong{font-size:clamp(17px,4.8vw,23px)!important;font-weight:950!important;color:#111!important;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.v68-mini-note{font-size:12px;color:#667085;line-height:1.4;margin-top:8px}.v68-toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);z-index:1000002;background:#111;color:#fff;border-radius:999px;padding:12px 16px;font-weight:900;font-size:14px;opacity:0;pointer-events:none;transition:.2s}.v68-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(min-width:720px){.v68-grid{grid-template-columns:1fr 1fr}.v68-grid .full{grid-column:1/-1}.v68-actions{grid-template-columns:1fr 1fr}.v68-cart-float{left:auto;right:20px;bottom:20px;min-width:310px}.v68-panel{align-items:center}.v68-pack-gallery{grid-template-columns:repeat(3,1fr)}}@media(max-width:430px){.v68-sheet{border-radius:24px;padding:16px}.v68-pack-card{min-height:174px}.v68-cart-item{grid-template-columns:1fr 76px 34px;padding:9px}.v68-qty button,.v68-remove{width:29px;height:29px}}
`;
const V68_JS = `
(function(){
  const WHATSAPP='${WHATSAPP_NUMBER}';
  const STORE_KEY='protexdz_v68_cart';
  let cart=[];
  function load(){try{cart=JSON.parse(localStorage.getItem(STORE_KEY)||'[]')}catch(e){cart=[]}}
  function save(){localStorage.setItem(STORE_KEY,JSON.stringify(cart));updateCount();}
  function toast(t){let el=document.getElementById('v68-toast'); if(!el){el=document.createElement('div');el.id='v68-toast';el.className='v68-toast';document.body.appendChild(el)} el.textContent=t; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1400)}
  window.v68AddToCart=function(name, meta, img){load(); const key=(name+'|'+(meta||'')).toLowerCase(); const found=cart.find(x=>x.key===key); if(found){found.qty+=1}else{cart.push({key,name,meta:meta||'',qty:1,img:img||''})} save(); renderCart(); toast('Ajouté au devis');}
  window.v68AddPack=function(name){v68AddToCart(name,'Pack / spécialité sélectionné',''); const pack=document.getElementById('v68-pack'); if(pack){pack.value=name; togglePackProduct();} openQuotePanel();}
  window.openQuotePanel=function(){load(); ensurePanel(); renderCart(); document.getElementById('v68-panel').classList.add('open')}
  window.closeQuotePanel=function(){const p=document.getElementById('v68-panel'); if(p) p.classList.remove('open')}
  window.v68ChangeQty=function(i,d){load(); if(!cart[i])return; cart[i].qty+=d; if(cart[i].qty<=0)cart.splice(i,1); save(); renderCart();}
  window.v68Remove=function(i){load(); cart.splice(i,1); save(); renderCart();}
  window.v68Clear=function(){cart=[]; save(); renderCart(); toast('Panier vidé')}
  function updateCount(){const c=document.getElementById('v68-cart-count'); if(c)c.textContent=cart.reduce((s,x)=>s+x.qty,0)}
  function renderCart(){load(); updateCount(); const list=document.getElementById('v68-cart-list'); if(!list)return; if(!cart.length){list.innerHTML='<div class="v68-empty">Aucun produit ajouté. Cliquez sur + sous les produits, ou choisissez un pack/couleur.</div>';return;} list.innerHTML=cart.map((it,i)=>'<div class="v68-cart-item"><div><strong>'+esc(it.name)+'</strong><small>'+esc(it.meta||'Produit sélectionné')+'</small></div><div class="v68-qty"><button type="button" onclick="v68ChangeQty('+i+',-1)">−</button><span>'+it.qty+'</span><button type="button" onclick="v68ChangeQty('+i+',1)">+</button></div><button class="v68-remove" type="button" onclick="v68Remove('+i+')">×</button></div>').join('')}
  function esc(s){return String(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function ensurePanel(){ if(document.getElementById('v68-panel'))return; const html='<div class="v68-panel" id="v68-panel" onclick="if(event.target.id===\'v68-panel\')closeQuotePanel()"><div class="v68-sheet"><div class="v68-head"><div><h2>Demande de devis multi-produits</h2><div class="v68-help">Ajoutez plusieurs produits, couleurs ou packs. Le message WhatsApp enverra nom société + téléphone + email + pack + quantité + détails.</div></div><button class="v68-close" type="button" onclick="closeQuotePanel()">×</button></div><div class="v68-pack-gallery"><div class="v68-pack-card"><h3>Pack chantier</h3><p>Tenue + chaussures + gilet + EPI selon besoin.</p><button class="v68-pack-btn" type="button" onclick="v68AddPack(\'Pack chantier\')">+ Pack</button></div><div class="v68-pack-card"><h3>Pack cuisine</h3><p>Tenue cuisine, tablier, calot, personnalisation logo.</p><button class="v68-pack-btn" type="button" onclick="v68AddPack(\'Pack cuisine\')">+ Pack</button></div><div class="v68-pack-card"><h3>Pack sécurité</h3><p>Agent sécurité, gilet, pantalon, polo, marquage.</p><button class="v68-pack-btn" type="button" onclick="v68AddPack(\'Pack sécurité\')">+ Pack</button></div></div><div id="v68-cart-list" class="v68-cart-list"></div><div class="v68-grid"><div class="v68-field"><label>Nom société / client</label><input id="v68-company" placeholder="Nom de la société ou client"></div><div class="v68-field"><label>Nom contact</label><input id="v68-name" placeholder="Votre nom"></div><div class="v68-field"><label>Téléphone</label><input id="v68-phone" inputmode="tel" placeholder="Ex: 0555 00 00 00"></div><div class="v68-field"><label>Email</label><input id="v68-email" type="email" placeholder="exemple@email.com"></div><div class="v68-field"><label>Pack / spécialité</label><select id="v68-pack" onchange="togglePackProduct()"><option value="">Sans pack</option><option>Pack chantier</option><option>Pack cuisine</option><option>Pack sécurité</option><option>Pack impression textile</option><option>Autre spécialité</option></select></div><div class="v68-field"><label>Produit individuel rapide</label><select id="v68-product"><option value="">Choisir si besoin</option><option>Combinaison de Travail</option><option>Salopette de Travail</option><option>Tenue de Travail 2 pièces</option><option>Tenue Agent Sécurité</option><option>Tenue de Cuisine 3 pièces</option><option>Gilet de Travail</option><option>Polo personnalisé</option><option>T-shirt personnalisé</option><option>Chaussures de sécurité S3</option></select></div><div class="v68-field full"><label>Détails supplémentaires</label><textarea id="v68-details" placeholder="Quantité, couleur, taille, détails impression/logo, adresse de livraison, urgence..."></textarea></div></div><div class="v68-actions"><button class="v68-send" type="button" onclick="v68SendWhatsApp()">Envoyer sur WhatsApp</button><button class="v68-clear" type="button" onclick="v68Clear()">Vider le panier</button></div><div class="v68-mini-note">Email et numéro seront inclus clairement dans le message WhatsApp.</div></div></div>'; document.body.insertAdjacentHTML('beforeend',html); }
  window.togglePackProduct=function(){const pack=document.getElementById('v68-pack'), prod=document.getElementById('v68-product'); if(!pack||!prod)return; if(pack.value){prod.disabled=true; prod.value=''; prod.style.background='#f3f4f6'; prod.style.color='#9ca3af'}else{prod.disabled=false; prod.style.background='#fff'; prod.style.color='#111827'}}
  window.v68SendWhatsApp=function(){load(); const company=val('v68-company'), name=val('v68-name'), phone=val('v68-phone'), email=val('v68-email'), pack=val('v68-pack'), prod=val('v68-product'), details=val('v68-details'); let items=cart.map((x,i)=>(i+1)+'. '+x.name+' — Qté: '+x.qty+(x.meta?' — '+x.meta:'')).join('\n'); if(prod) items+=(items?'\n':'')+'Produit individuel: '+prod; if(!items) items='Aucun produit ajouté précisément — demande générale.'; const msg='Bonjour PROTEX-DZ, je souhaite un devis détaillé.\n\nSociété / client: '+(company||'Non précisé')+'\nNom contact: '+(name||'Non précisé')+'\nTéléphone: '+(phone||'Non précisé')+'\nEmail: '+(email||'Non précisé')+'\nPack / spécialité: '+(pack||'Sans pack')+'\n\nProduits demandés:\n'+items+'\n\nDétails supplémentaires:\n'+(details||'Non précisé')+'\n\nPage: '+location.href; window.open('https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg),'_blank','noopener');}
  function val(id){const e=document.getElementById(id);return e?e.value.trim():''}
  function labelFrom(el){let title=''; const h=el.querySelector('h1,h2,h3,h4,.card-title,.local-name'); if(h) title=h.textContent.replace(/→|\+/g,' ').trim(); if(!title){const img=el.querySelector('img[alt]'); if(img) title=img.alt.trim()} return title||'Produit PROTEX-DZ'}
  function imgFrom(el){const img=el.querySelector('img'); return img?img.src:''}
  function addButtons(){const selectors=['.real-product-card','.local-product','article.card-local','article.card-import','article.card-impression','.card']; const seen=new Set(); document.querySelectorAll(selectors.join(',')).forEach(el=>{ if(seen.has(el)||el.querySelector('.v68-plus-btn'))return; seen.add(el); const title=labelFrom(el); if(/contact|reference|client/i.test(title))return; const btn=document.createElement('button'); btn.type='button'; btn.className='v68-plus-btn'; btn.innerHTML='<span>+</span> Ajouter au devis'; btn.addEventListener('click',ev=>{ev.preventDefault();ev.stopPropagation();v68AddToCart(title,'Produit choisi depuis le catalogue',imgFrom(el)); btn.classList.add('added'); btn.innerHTML='✓ Ajouté au devis'; setTimeout(()=>{btn.classList.remove('added');btn.innerHTML='<span>+</span> Ajouter au devis'},1200)}); const body=el.querySelector('.card-body,.local-info')||el; body.appendChild(btn); }); }
  function colorClicks(){document.querySelectorAll('.color-dot-item').forEach(item=>{ if(item.dataset.v68)return; item.dataset.v68='1'; const name=(item.querySelector('small')?.textContent||item.getAttribute('title')||'Couleur').trim(); const add=()=>{document.querySelectorAll('.color-dot-item').forEach(i=>i.classList.remove('v68-active')); item.classList.add('v68-active'); v68AddToCart('T-shirt / Polo personnalisé','Couleur: '+name,''); openQuotePanel();}; item.addEventListener('click',add); const b=document.createElement('button'); b.type='button'; b.className='v68-color-add'; b.textContent='+ Devis'; b.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();add();}); item.appendChild(b); }); }
  function clearStrayN(){document.querySelectorAll('#contact .contact-line,.contact-item,a,p,span').forEach(el=>{ if(el.childNodes.length===1 && el.textContent.trim()==='N') el.remove(); if(/@/.test(el.textContent||'')) el.classList.add('v68-email-strong'); });}
  function ensureFloat(){ if(!document.getElementById('v68-cart-float')){const b=document.createElement('button'); b.id='v68-cart-float'; b.className='v68-cart-float'; b.type='button'; b.onclick=openQuotePanel; b.innerHTML='Devis multi-produits <span id="v68-cart-count" class="v68-cart-count">0</span>'; document.body.appendChild(b);} }
  function enhance(){ensurePanel(); ensureFloat(); addButtons(); colorClicks(); clearStrayN(); updateCount(); const old=document.querySelector('.float-wa'); if(old){old.textContent='Devis'; old.setAttribute('href','javascript:openQuotePanel()')} setInterval(()=>{addButtons();colorClicks();clearStrayN();},1600);}
  load(); if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',enhance); else enhance();
})();
`;
function fallbackIframe(){document.body.innerHTML='<iframe id="fallbackFrame" src="'+PROTEX_SOURCE_URL+'"></iframe><button class="patch-btn" style="position:fixed;right:14px;bottom:14px;z-index:999999;background:#14a94f" onclick="openQuotePanel()">Devis multi-produits</button>'; injectStyleAndScript();}
function injectStyleAndScript(){const st=document.createElement('style');st.textContent=V68_CSS;document.head.appendChild(st);const sc=document.createElement('script');sc.textContent=V68_JS;document.body.appendChild(sc);}
(async function(){
  try{
    const res=await fetch(PROTEX_SOURCE_URL,{cache:'no-store'});
    if(!res.ok) throw new Error('fetch failed');
    let html=await res.text();
    html=html.replace(/<base[^>]*>/gi,'');
    document.open(); document.write(html); document.close();
    setTimeout(injectStyleAndScript,60);
  }catch(e){fallbackIframe();}
})();
</script>
</body>
</html>
